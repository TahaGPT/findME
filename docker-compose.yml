services:
  db:
    image: ankane/pgvector:latest
    container_name: vyro-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vyro_user
      POSTGRES_PASSWORD: vyro_password
      POSTGRES_DB: vyro_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyro_user -d vyro_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: vyro-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://vyro_user:vyro_password@db/vyro_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
